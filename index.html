<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="태어난 달을 입력하여 당신의 탄생화를 알아보세요.">
    <meta name="keywords" content="탄생화, 생일, 생년월일, 탄생꽃, 생일꽃">
    <title>나의 탄생화는 무엇일까?</title>
    <!-- 글꼴 -->
    
    <!-- 파비콘, 리셋, 디자인 -->
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/4593/4593472.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <main>
        <div class="title">
            <p>The Flower of My Birth Day</p>
            <h1>나의 탄생화 찾기</h1>
        </div>
        <div class="contents">
            <input id="user_birthday" placeholder="태어난 달을 숫자로 입력해주세요.">
            <button id="birthday_result_btn">나의 꽃과 꽃말 만나기</button>
            <!-- a태그는 클릭 시 다른페이지로 이동 -->
            <!-- button태그는 클릭 시 범용기능을 동적으로 표현 -->
        </div>
    </main>

</html>
