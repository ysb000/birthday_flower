<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="태어난 달을 입력하여 당신의 탄생화를 알아보세요.">
    <meta name="keywords" content="탄생화, 생일, 생년월일, 탄생꽃, 생일꽃">
    <title>나의 탄생화는 무엇일까?</title>
    <!-- 글꼴 -->
    
    <!-- 파비콘, 리셋, 디자인 -->
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/128/4593/4593472.png" type="image/x-icon">
    <link rel="stylesheet" href="./styles/reset.css">
    <link rel="stylesheet" href="./styles/index.css">
    <script src="./scripts/index.js" defer></script>
</head>
<body>
    <main>
        <div class="title">
            <p>The Flower of My Birth Day</p>
            <h1>나의 탄생화 찾기</h1>
        </div>
        <form action="#" method="get" name="contents_frm">
            <input type="text" onclick="userBirthdayOutput()" name="user_birthday" id="user_birthday" autofocus placeholder="태어난 달을 숫자로 입력해주세요.">
            <button type="button" onclick="popupShow()" id="birthday_result_btn"> 나의 꽃과 꽃말 만나기</button>
            <!-- button태그는 클릭 시 범용기능을 동적으로 표현/a태그는 클릭 시 이동 -->
        </form>
        <div class="birthday_result_popup">
            <p class="birthday_month">Birthday Month 12</p>
            <p class="flower_language">꽃말: 자기애, 자존심, 외로움</p>
            <h2>당신의 탄생화는<br><em>'수선화'</em>입니다.</h2>
        </div>
        <div class="popup_bg" onclick="popupHide()"></div>
        </main>
</body>
</html>
